<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>

  <style>
    body {
      font-family:Arial, sans-serif;
            background-color: #eef2f3;
            padding: 30px;
    }
    
  header {
    background-color: #2c3e50;
    color: white;
    padding: 20px;
    text-align: center;
    }


        form {
            width: 400px;
            margin: auto;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn {
            background-color: #28a745;
            color: white;
        }

        .clear-btn {
            background-color: #dc3545;
            color: white;
            margin-right: 10px;
        }

        button:hover {
            opacity: 0.9;
        }
      
  </style>
  
</head>

<body>

  <!-- Header Section -->
    <header>

    <h1>Contact Us</h1>
    </header>
  
<form>

<label>Name:</label><br>
<input type="text" name="name"><br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Message:</label><br>
<textarea name="message"></textarea><br><br>

<input type="submit" value="Send">

</form>

</body>
</html>
